name: flutter_secure_shield
description: Advanced root detection and jailbreak detection Flutter plugin with comprehensive security checks.
version: 1.0.1
homepage: https://github.com/KasunHasanga/flutter_secure_shield

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.secureshield.flutter_secure_shield
        pluginClass: SecureShieldPlugin
      ios:
        pluginClass: SecureShieldPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
